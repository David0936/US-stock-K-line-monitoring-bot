      <circle cx="6" cy="118" r="5" fill="#FF433D"/><text x="18" y="122" class="ink" font-size="14" font-weight="700">运行中 LIVE</text>
    </g>
    <g transform="translate(266,0)">
      <text y="100" class="muted" font-weight="700" letter-spacing="1">当前时段</text>
      <text y="122" class="ink" font-size="14" font-weight="700">盘前 PRE-MARKET</text>
