<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" font-family="-apple-system,Helvetica,Arial,sans-serif">
  <defs>
    <style>
      .mono{font-family:'IBM Plex Mono','SFMono-Regular',Menlo,Consolas,monospace}
      .ink{fill:#0A0A0A}.muted{fill:#7A7068}.up{fill:#FF433D}.down{fill:#00A33E}.paper{fill:#FBF1E9}
    </style>
  </defs>

  <!-- ground -->
  <rect x="0" y="0" width="1200" height="620" fill="#FBF1E9"/>
  <rect x="8" y="8" width="1184" height="604" fill="none" stroke="#0A0A0A" stroke-width="1"/>

  <!-- masthead -->
  <text x="28" y="52" class="ink" font-size="34" font-weight="800" letter-spacing="-1">US ALL-DAY DESK</text>
  <text x="372" y="50" class="muted" font-size="15" font-weight="700">美股全天候盯盘终端</text>
  <text x="1172" y="34" class="muted" font-size="11" font-weight="700" text-anchor="end" letter-spacing="1">FT × BLOOMBERG · 示意预览</text>
  <line x1="8" y1="74" x2="1192" y2="74" stroke="#0A0A0A" stroke-width="3"/>

  <!-- status bar -->
