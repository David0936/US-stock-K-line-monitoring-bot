  <text x="28" y="466" class="ink" font-size="16" font-weight="900" letter-spacing="-0.5">SIGNAL FEED · 信号流</text>
  <rect x="9" y="478" width="1182" height="128" fill="#FBF1E9"/>
  <rect x="9" y="478" width="1182" height="128" fill="#FF433D" opacity="0.05"/>
  <text x="28" y="506" class="ink mono" font-size="16" font-weight="700">KORU</text>
  <text x="28" y="524" class="muted" font-size="10">3× 韩国多头 · 盘前</text>
  <rect x="120" y="492" width="92" height="18" fill="#FF433D"/><text x="128" y="505" fill="#fff" font-size="10" font-weight="800">开盘前预警</text>
  <rect x="220" y="492" width="92" height="18" fill="#FF433D"/><text x="228" y="505" fill="#fff" font-size="10" font-weight="800">建议减仓/回避</text>
  <text x="120" y="534" class="ink" font-size="13" font-weight="500">KOSPI 暴跌 −3.29% 触发；3× 杠杆对应理论跌幅约 −9%，与盘前竞价 −8.55% 吻合。隔夜外资净流出 +</text>
  <text x="120" y="554" class="ink" font-size="13" font-weight="500">美股期货走弱，反弹缺催化。<tspan font-weight="800">持有者优先在盘前流动性窗口减仓，勿在下降趋势中接飞刀。</tspan></text>
  <text x="120" y="582" class="muted mono" font-size="11">🎯 跌破 661(MA50) 减仓 · VWAP 680 · 反弹阻力 730 · 置信 中</text>
  <line x1="900" y1="486" x2="900" y2="598" stroke="#D8C7B8"/>
  <text x="924" y="502" class="muted" font-size="9" font-weight="700" letter-spacing="1">关键位 LEVELS</text>
  <text x="924" y="524" class="ink mono" font-size="12">触发线　KOSPI −3%</text>
  <text x="924" y="546" class="ink mono" font-size="12">盘前参考　22.46</text>
  <text x="924" y="568" class="ink mono" font-size="12">止损建议　21.80</text>
  <text x="924" y="590" class="ink mono" font-size="12">反弹阻力　24.10</text>
