    <text x="620" class="muted" font-size="10">日经225</text><text x="620" y="20" class="up" font-weight="600">64179 ▲+0.24%</text>
    <text x="800" class="muted" font-size="10">恒生</text><text x="800" y="20" class="down" font-weight="600">24365 ▼-1.18%</text>
