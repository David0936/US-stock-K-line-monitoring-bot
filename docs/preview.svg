      <text x="14" y="40" class="muted" font-size="9">英伟达</text>
      <text x="14" y="74" class="ink mono" font-size="22" font-weight="600">208.64</text>
      <text x="14" y="94" class="up mono" font-size="12" font-weight="600">▲ +3.54 +1.73%</text>
      <rect x="14" y="104" width="78" height="17" fill="#FF433D"/><text x="20" y="116" fill="#fff" font-size="9" font-weight="800">逃顶预警</text>
