  <line x1="256" y1="77" x2="256" y2="135" stroke="#D8C7B8"/><line x1="494" y1="77" x2="494" y2="135" stroke="#D8C7B8"/>
  <line x1="732" y1="77" x2="732" y2="135" stroke="#D8C7B8"/><line x1="970" y1="77" x2="970" y2="135" stroke="#D8C7B8"/>
  <line x1="8" y1="135" x2="1192" y2="135" stroke="#0A0A0A"/>

  <!-- macro strip -->
  <rect x="28" y="150" width="120" height="18" fill="#0A0A0A"/><text x="38" y="163" class="paper" font-size="10" font-weight="800" letter-spacing="2">MACRO 跨市场</text>
  <g font-size="13" class="mono" transform="translate(0,196)">
