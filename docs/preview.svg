      <text y="122" class="ink mono" font-size="14" font-weight="600">06-10 16:42:08</text>
    </g>
    <g transform="translate(742,0)">
      <text y="100" class="muted" font-weight="700" letter-spacing="1">美东时间</text>
      <text y="122" class="ink mono" font-size="14" font-weight="600">06-10 04:42:08</text>
    </g>
    <g transform="translate(980,0)">
